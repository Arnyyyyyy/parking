services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_parking}
      POSTGRES_USER: ${POSTGRES_USER:-parking_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_db_password}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-parking_user}:${POSTGRES_PASSWORD:-change_me_db_password}@db:5432/${POSTGRES_DB:-smart_parking}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:4173"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
